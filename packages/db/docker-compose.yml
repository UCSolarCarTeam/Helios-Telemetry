version: "3.9"

services:
  db:
    image: postgres:17 # Plain Postgres image
    env_file:
      - .env # contains the information regarding our user, password, and database
    ports:
      - "5432:5432" # map host port to internal port
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped # try to restart it unless manually stopped

volumes:
  postgres_data:

